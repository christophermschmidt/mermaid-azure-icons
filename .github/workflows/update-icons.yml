name: Update Icons

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for Fabric icon updates
        id: check
        run: |
          CURRENT=$(node -e "try { const l=require('./package-lock.json'); console.log(l.packages['node_modules/@fabric-msft/svg-icons']?.version || 'none') } catch(e) { console.log('none') }")
          LATEST=$(npm view @fabric-msft/svg-icons version)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update @fabric-msft/svg-icons
        if: steps.check.outputs.has_update == 'true'
        run: |
          npm install @fabric-msft/svg-icons@latest
          npm install

      - name: Fetch icons
        run: npm run fetch

      - name: Convert icons
        run: npm run convert

      - name: Build icon packs
        run: npm run build:icons

      - name: Check for changes in dist/
        id: changes
        run: |
          if git diff --quiet dist/fabric.json dist/azure.json docs/icon-catalogue.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            FABRIC_COUNT=$(node -e "const f=require('./dist/fabric.json'); console.log(Object.keys(f.icons).length)")
            AZURE_COUNT=$(node -e "const f=require('./dist/azure.json'); console.log(Object.keys(f.icons).length)")
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "fabric_count=$FABRIC_COUNT" >> $GITHUB_OUTPUT
            echo "azure_count=$AZURE_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update icons from upstream sources"
          title: "chore: icon update — fabric@${{ steps.check.outputs.latest }}"
          body: |
            ## Automated icon update

            | Source | Before | After |
            |--------|--------|-------|
            | `@fabric-msft/svg-icons` | ${{ steps.check.outputs.current }} | ${{ steps.check.outputs.latest }} |
            | `benc-uk/icon-collection` | latest | latest |

            **Icon counts after build:**
            - Fabric: ${{ steps.changes.outputs.fabric_count }} icons
            - Azure: ${{ steps.changes.outputs.azure_count }} icons

            Review `docs/icon-catalogue.md` for new or removed slugs before merging.
            Auto-generated by GitHub Actions — do not edit this PR manually.
          branch: "chore/icon-update-${{ github.run_number }}"
          labels: "automated,icons"
          delete-branch: true

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "Icon packs are already up to date. No PR needed."
